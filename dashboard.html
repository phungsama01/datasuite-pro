<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0f172a] text-[#f8fafc]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataSuite Pro - Secure Client-Side Engine</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://jsdelivr.net"></script>
    <!-- SheetJS Engine -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-light: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --border: #334155;
        }
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body class="min-h-full flex flex-col justify-between selection:bg-sky-500/30 selection:text-sky-400">

    <!-- Enterprise Header Bar -->
    <header class="sticky top-0 z-40 w-full border-b border-slate-800/80 bg-slate-950/80 backdrop-blur-xl transition-all duration-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-2">
                    <div class="h-9 w-9 rounded-lg bg-gradient-to-br from-sky-400 to-blue-600 flex items-center justify-center text-slate-950 font-black tracking-tighter text-lg shadow-lg shadow-sky-500/20">
                        DS
                    </div>
                    <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-slate-50 via-slate-100 to-slate-300 bg-clip-text text-transparent">DataSuite <span class="text-sky-400 font-semibold">Pro</span></span>
                </div>
                <span class="hidden sm:inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-slate-900 text-emerald-400 border border-emerald-500/20 shadow-inner">
                    🔒 100% Client-Side Secure (GDPR/SOC2 Ready)
                </span>
            </div>
            <div>
                <a href="/" class="text-sm font-medium text-slate-400 hover:text-sky-400 transition-colors duration-200 flex items-center space-x-1 group">
                    <span>← View Terms of Service</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Notification Center Toast -->
        <div id="toast" class="hidden mb-6 p-4 rounded-xl border border-amber-500/20 bg-amber-500/10 text-amber-300 text-sm flex items-center justify-between shadow-2xl transition-all duration-200">
            <div class="flex items-center space-x-2">
                <span id="toast-message">Notification template text.</span>
            </div>
            <button onclick="document.getElementById('toast').classList.add('hidden')" class="text-amber-400 hover:text-amber-200 font-bold px-2">&times;</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left Sidebar Panel -->
            <div class="lg:col-span-4 space-y-6">
                
                <!-- Card 1: Interactive Drag-and-Drop Area -->
                <div id="drop-zone" class="relative group rounded-2xl border border-dashed border-slate-700 hover:border-sky-500/50 bg-slate-900/50 p-6 text-center transition-all duration-200 ease-in-out cursor-pointer shadow-xl">
                    <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".csv,.xlsx,.json,.txt">
                    <div class="flex flex-col items-center justify-center space-y-3">
                        <div class="p-4 rounded-xl bg-slate-800/60 text-sky-400 group-hover:scale-105 transition-transform duration-200 border border-slate-700/50">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://w3.org">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                            </svg>
                        </div>
                        <div>
                            <p class="text-sm font-semibold text-slate-200">Drag & drop standard files here</p>
                            <p class="text-xs text-slate-400 mt-1">or click to browse local storage arrays</p>
                        </div>
                        <div class="pt-3 border-t border-slate-800/80 w-full flex justify-center gap-2 flex-wrap">
                            <span class="px-2 py-0.5 rounded text-[10px] font-mono bg-slate-800 text-slate-400 border border-slate-700/50">.CSV</span>
                            <span class="px-2 py-0.5 rounded text-[10px] font-mono bg-slate-800 text-slate-400 border border-slate-700/50">.XLSX</span>
                            <span class="px-2 py-0.5 rounded text-[10px] font-mono bg-slate-800 text-slate-400 border border-slate-700/50">.JSON</span>
                            <span class="px-2 py-0.5 rounded text-[10px] font-mono bg-slate-800 text-slate-400 border border-slate-700/50">.TXT</span>
                        </div>
                    </div>
                </div>

                <!-- Card 2: Engine Module Workspace Menu -->
                <div class="rounded-2xl border border-slate-800/80 bg-slate-900/40 p-5 shadow-xl backdrop-blur-xl">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Core Software Modules</h3>
                    <div class="space-y-3" id="modules-list">
                        <!-- Module 1 -->
                        <button onclick="setActiveModule(1)" id="mod-btn-1" class="w-full text-left p-3.5 rounded-xl transition-all duration-200 border border-sky-500 bg-sky-950/20 text-sky-400 shadow-sm ring-1 ring-sky-500/30">
                            <div class="flex items-start space-x-3">
                                <div class="mt-1 font-bold text-xs bg-sky-500/20 px-1.5 py-0.5 rounded text-sky-400">M1</div>
                                <div>
                                    <div class="text-sm font-semibold">Multi-Format Transformer</div>
                                    <div class="text-xs text-slate-300 mt-1">Converts nested structures into uniform enterprise .CSV matrices.</div>
                                </div>
                            </div>
                        </button>

                        <!-- Module 2 -->
                        <button onclick="setActiveModule(2)" id="mod-btn-2" class="w-full text-left p-3.5 rounded-xl transition-all duration-200 border border-slate-800 bg-slate-900/60 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50">
                            <div class="flex items-start space-x-3">
                                <div class="mt-1 font-bold text-xs bg-slate-800 px-1.5 py-0.5 rounded text-slate-400">M2</div>
                                <div>
                                    <div class="text-sm font-semibold">Data Sanitizer & Cleaner</div>
                                    <div class="text-xs text-slate-400 mt-1">Purges empty rows, strips trailing characters, removes duplicate records.</div>
                                </div>
                            </div>
                        </button>

                        <!-- Module 3 -->
                        <button onclick="setActiveModule(3)" id="mod-btn-3" class="w-full text-left p-3.5 rounded-xl transition-all duration-200 border border-slate-800 bg-slate-900/60 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50">
                            <div class="flex items-start space-x-3">
                                <div class="mt-1 font-bold text-xs bg-slate-800 px-1.5 py-0.5 rounded text-slate-400">M3</div>
                                <div>
                                    <div class="text-sm font-semibold">Field Standardizer</div>
                                    <div class="text-xs text-slate-400 mt-1">Unifies variants via regex filters to E.164 phones and ISO 8601 dates.</div>
                                </div>
                            </div>
                        </button>

                        <!-- Module 4 -->
                        <button onclick="setActiveModule(4)" id="mod-btn-4" class="w-full text-left p-3.5 rounded-xl transition-all duration-200 border border-slate-800 bg-slate-900/60 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50">
                            <div class="flex items-start space-x-3">
                                <div class="mt-1 font-bold text-xs bg-slate-800 px-1.5 py-0.5 rounded text-slate-400">M4</div>
                                <div>
                                    <div class="text-sm font-semibold">Smart AI Pipeline Extraction</div>
                                    <div class="text-xs text-slate-400 mt-1">Isolates strings and remaps objects directly to HubSpot/Shopify models.</div>
                                </div>
                            </div>
                        </button>
                    </div>
                </div>

            </div>

            <!-- Right Main Workspace Panel -->
            <div class="lg:col-span-8 flex flex-col justify-between space-y-6">
                <!-- Large Workspace Container -->
